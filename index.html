<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <p class="title">Generate a <span>random password</span></p>
            <p class="caption">Never use an insecure password again.</p>
            <div>
                <div class="input-container">
                    <input id="custom-length" type="text" placeholder="Length (Default: 15)">
                    <input id="omit-chars" type="text" placeholder="Omit characters (optional) i.e. !@#$%...">
                </div>
                <button id="submit">Generate passwords</button>
                <div class="pswd-container">
                    <div id="password-1" class="pswd-display"></div>
                    <div id="password-2" class="pswd-display"></div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
